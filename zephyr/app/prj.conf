# Minimal Zephyr configuration
CONFIG_SYS_CLOCK_TICKS_PER_SEC=100

# GPIO support
CONFIG_GPIO=y

# UART and console
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# UART device drivers for STM32
CONFIG_UART_STM32=y

# UART settings
CONFIG_UART_INTERRUPT_DRIVEN=y

# Ring buffer for UART RX
CONFIG_RING_BUFFER=y

# Pinctrl for UART pin assignment
CONFIG_PINCTRL=y
CONFIG_PINCTRL_STM32=y

# ADC support
CONFIG_ADC=y
